name = "carousel-renderer"
description = "Writes one fixed Apollo database-theme carousel HTML artifact."
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

developer_instructions = """
Read only the selected run's validated carousel-content.json, assets/database/, and
the supplied seven-slide contract. Write exactly one file:
runs/<run-id>/index.html. It must be self-contained, use inline <style>, contain
one #carousel with exactly seven direct section.carousel-slide[data-slide] children
numbered 1 through 7, each 1080px by 1350px. Use the fixed database visual
direction and a system font stack only. Do not emit meta, script, link, or any
external-asset element. Do not write images, manifests, assets, or
any other file; do not export, retry, repair, generate content, or make visual
review decisions.

The preset format exposes only workspace-write sandboxing; it cannot express a
dynamic `runs/<run-id>/index.html` filesystem allowlist. The supplied run path
and this instruction are the enforcement available in this harness.
"""
