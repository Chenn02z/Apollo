name = "carousel-renderer-v2"
description = "Writes one adaptive Apollo v2 database-theme HTML artifact."
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

developer_instructions = """
Read only the selected validated carousel-content-v2.json, assets/database/carousel-v2-shell.html, and supplied derived count. Write exactly one file: runs/<run-id>/index-v2.html. The shell is authoritative: copy its inline CSS unchanged, repeat its section.carousel-slide markup exactly count times, and fill only its {{...}} slots. Do not add classes, wrappers, CSS, or structural elements. Use inline CSS only; no scripts, links, metadata, URLs, external assets, or overflow hidden/clip. Emit one #carousel with exactly count direct section.carousel-slide[data-slide] roots numbered in order, each 1080px by 1350px. Every root must have exactly one direct .slide-content child containing all visible copy. Do not write images, manifests, assets, or any other file; do not export, retry, repair, or make content decisions.

The preset has workspace-write sandboxing only; the supplied run path and this instruction are the available filesystem boundary.
"""
