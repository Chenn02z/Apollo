<style>
{{theme_css}}
</style>
<template data-shell="database-blueprint"><section class="carousel-slide" data-slide="{{number}}"><div class="slide-content"><header class="masthead"><span class="brand">db notes</span><span class="section-label">{{header_topic}} · {{header_number}}</span></header><div class="content"><span class="tag">{{role}}</span><h1>{{title}}</h1><p class="why"><span class="why-label">Why this matters</span>{{why}}</p><div class="slide-body">{{body}}</div></div><aside class="glossary">{{glossary}}</aside><footer class="footer"><span>{{footer_topic}}</span><span>{{footer_number}} / {{count_padded}}</span></footer></div></section></template>
