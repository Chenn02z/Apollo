<style>
:root { --paper:#f4f0e9; --ink:#252421; --line:#706b63; --faint:#d7d1c7; --blue:#285d7c; --red:#a52a25; --green:#39755e; }
* { box-sizing:border-box; } html,body { margin:0; } #carousel { width:1080px; }
.carousel-slide { width:1080px; height:1350px; background:var(--paper); background-image:radial-gradient(#c9c2b6 .65px,transparent .7px); background-size:19px 19px; color:var(--ink); }
.slide-content { height:100%; padding:64px; display:flex; flex-direction:column; }
.masthead,.footer { display:flex; justify-content:space-between; gap:16px; font:500 14px/20px system-ui,sans-serif; letter-spacing:.14em; text-transform:uppercase; }
.masthead { padding-bottom:14px; border-bottom:1px solid var(--line); }.brand { color:var(--ink); font:700 18px/20px Georgia,serif; letter-spacing:0; text-transform:none; }.section-label { white-space:nowrap; }
.content { min-height:0; flex:1; display:flex; flex-direction:column; justify-content:center; gap:22px; }.tag { align-self:flex-start; padding:4px 11px; background:var(--blue); color:#fff; font:500 12px/18px system-ui,sans-serif; letter-spacing:.13em; text-transform:uppercase; }
.content h1 { margin:0; max-width:850px; font:700 64px/1.12 Georgia,serif; letter-spacing:-.055em; }.why { margin:0; padding:15px 0; border-top:1px solid var(--faint); border-bottom:1px solid var(--faint); font:italic 22px/1.5 Georgia,serif; }.why-label { display:block; margin-bottom:5px; color:#6a655d; font:500 12px/18px system-ui,sans-serif; letter-spacing:.13em; text-transform:uppercase; }
.hero .prompt { margin:18px 0; font:700 34px/1.3 Georgia,serif; text-align:center; }.hero .prompt-arrow { color:var(--red); }.fact-panel { margin:12px 0; text-align:center; }.fact-value { display:block; color:var(--red); font:800 118px/1.2 system-ui,sans-serif; letter-spacing:-.09em; }.fact-label { color:var(--red); font:700 20px/1.2 system-ui,sans-serif; }
.list-items { display:grid; gap:9px; margin:8px 0; }.list-item { display:grid; grid-template-columns:minmax(240px,260px) minmax(0,1fr); gap:14px; padding:14px 0; border-bottom:1px solid var(--faint); }.list-item-label { color:var(--blue); font:800 38px/1.2 system-ui,sans-serif; }.list-item-detail { font:italic 19px/1.4 Georgia,serif; }.quote-block { margin:12px 0; padding-left:24px; border-left:5px solid #adc3cd; font:italic 31px/1.4 Georgia,serif; }.quote-attribution { display:block; margin-top:22px; font:700 16px/1.3 system-ui,sans-serif; font-style:normal; }
.comparison-grid { display:grid; grid-template-columns:1fr 1fr; gap:22px; margin:8px 0; }.comparison-side { padding-top:9px; border-top:4px solid var(--green); }.comparison-side:last-child { border-color:var(--red); }.comparison-label { margin:0; color:var(--green); font:800 18px/1.2 system-ui,sans-serif; }.comparison-side:last-child .comparison-label { color:var(--red); }.comparison-summary { margin:8px 0; font:italic 18px/1.4 Georgia,serif; }.comparison-items { margin:0; padding-left:20px; font:18px/1.45 system-ui,sans-serif; }.levels-items { display:grid; gap:17px; margin:8px 0; }.level-label { display:flex; justify-content:space-between; font:700 16px/1.3 system-ui,sans-serif; letter-spacing:.06em; text-transform:uppercase; }.level-progress { display:block; width:100%; height:10px; margin-top:6px; accent-color:var(--blue); }.level-description { display:block; margin-top:5px; font:italic 17px/1.35 Georgia,serif; }
.glossary { display:grid; grid-template-columns:130px 1fr; gap:6px 14px; padding-top:12px; border-top:1px solid var(--line); }.glossary-term { font:500 12px/1.35 system-ui,sans-serif; letter-spacing:.1em; text-transform:uppercase; }.glossary-definition { font:italic 16px/1.35 Georgia,serif; }.footer { padding-top:14px; border-top:1px solid var(--line); }
</style>
<template data-variant="hero"><section class="carousel-slide hero" data-slide="{{number}}"><div class="slide-content"><header class="masthead"><span class="brand">db notes</span><span class="section-label">{{header_topic}} · {{header_number}}</span></header><div class="content"><span class="tag">{{role}}</span><h1>{{title}}</h1><p class="why"><span class="why-label">Why this matters</span>{{why}}</p><p class="prompt">{{prompt}} <span class="prompt-arrow">→</span></p></div><aside class="glossary">{{glossary}}</aside><footer class="footer"><span>{{footer_topic}}</span><span>{{footer_number}} / {{count_padded}}</span></footer></div></section></template>
<template data-variant="fact"><section class="carousel-slide fact" data-slide="{{number}}"><div class="slide-content"><header class="masthead"><span class="brand">db notes</span><span class="section-label">{{header_topic}} · {{header_number}}</span></header><div class="content"><span class="tag">{{role}}</span><h1>{{title}}</h1><p class="why"><span class="why-label">Why this matters</span>{{why}}</p><div class="fact-panel"><strong class="fact-value">{{fact_value}}</strong><span class="fact-label">{{fact_label}}</span></div></div><aside class="glossary">{{glossary}}</aside><footer class="footer"><span>{{footer_topic}}</span><span>{{footer_number}} / {{count_padded}}</span></footer></div></section></template>
<template data-variant="list"><section class="carousel-slide list" data-slide="{{number}}"><div class="slide-content"><header class="masthead"><span class="brand">db notes</span><span class="section-label">{{header_topic}} · {{header_number}}</span></header><div class="content"><span class="tag">{{role}}</span><h1>{{title}}</h1><p class="why"><span class="why-label">Why this matters</span>{{why}}</p><div class="list-items">{{list_items}}</div></div><aside class="glossary">{{glossary}}</aside><footer class="footer"><span>{{footer_topic}}</span><span>{{footer_number}} / {{count_padded}}</span></footer></div></section></template>
<template data-variant="quote"><section class="carousel-slide quote" data-slide="{{number}}"><div class="slide-content"><header class="masthead"><span class="brand">db notes</span><span class="section-label">{{header_topic}} · {{header_number}}</span></header><div class="content"><span class="tag">{{role}}</span><h1>{{title}}</h1><p class="why"><span class="why-label">Why this matters</span>{{why}}</p><blockquote class="quote-block">{{quote}}<cite class="quote-attribution">{{attribution}}</cite></blockquote></div><aside class="glossary">{{glossary}}</aside><footer class="footer"><span>{{footer_topic}}</span><span>{{footer_number}} / {{count_padded}}</span></footer></div></section></template>
<template data-variant="comparison"><section class="carousel-slide comparison" data-slide="{{number}}"><div class="slide-content"><header class="masthead"><span class="brand">db notes</span><span class="section-label">{{header_topic}} · {{header_number}}</span></header><div class="content"><span class="tag">{{role}}</span><h1>{{title}}</h1><p class="why"><span class="why-label">Why this matters</span>{{why}}</p><div class="comparison-grid">{{comparison_sides}}</div></div><aside class="glossary">{{glossary}}</aside><footer class="footer"><span>{{footer_topic}}</span><span>{{footer_number}} / {{count_padded}}</span></footer></div></section></template>
<template data-variant="levels"><section class="carousel-slide levels" data-slide="{{number}}"><div class="slide-content"><header class="masthead"><span class="brand">db notes</span><span class="section-label">{{header_topic}} · {{header_number}}</span></header><div class="content"><span class="tag">{{role}}</span><h1>{{title}}</h1><p class="why"><span class="why-label">Why this matters</span>{{why}}</p><div class="levels-items">{{level_items}}</div></div><aside class="glossary">{{glossary}}</aside><footer class="footer"><span>{{footer_topic}}</span><span>{{footer_number}} / {{count_padded}}</span></footer></div></section></template>
