<style>
:root { --paper:#f4f0e9; --ink:#252421; --line:#706b63; --blue:#285d7c; }
* { box-sizing:border-box; }
html, body { margin:0; }
#carousel { width:1080px; }
.carousel-slide { width:1080px; height:1350px; background:var(--paper); color:var(--ink); }
.slide-content { height:100%; padding:64px; display:flex; flex-direction:column; gap:22px; }
.masthead, .footer { height:20px; flex:0 0 20px; display:flex; justify-content:space-between; font:14px/20px system-ui,sans-serif; letter-spacing:.08em; text-transform:uppercase; }
.section-label { white-space:nowrap; }
.content { min-height:0; flex:1; display:flex; flex-direction:column; justify-content:center; gap:22px; }
.tag { align-self:flex-start; padding:0 10px; background:var(--blue); color:var(--paper); font:700 12px/18px system-ui,sans-serif; letter-spacing:.08em; text-transform:uppercase; }
h1, h2 { margin:0; font-family:Georgia,serif; line-height:1.12; letter-spacing:-.04em; }
h1 { font-size:70px; }
h2 { font-size:50px; }
.lead { margin:0; font:italic 29px/42px Georgia,serif; }
.statistic { margin:0; font:700 90px/1.1 system-ui,sans-serif; letter-spacing:-.06em; }
.cards { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
.card { min-height:150px; padding:20px; border:1px solid var(--line); border-top:6px solid var(--blue); }
.card > :first-child { margin-top:0; }
.card > :last-child { margin-bottom:0; }
.footer { padding-top:14px; height:35px; flex-basis:35px; border-top:1px solid var(--line); }
</style>
<main id="carousel">
  <!-- Repeat this exact section once per slide, replacing only {{...}} slots. -->
  <section class="carousel-slide" data-slide="{{number}}">
    <div class="slide-content">
      <header class="masthead"><span class="brand">db notes</span><span class="section-label">{{topic}} · {{number_padded}}</span></header>
      <div class="content">{{content}}</div>
      <footer class="footer"><span>{{topic}}</span><span>{{number_padded}} / {{count_padded}}</span></footer>
    </div>
  </section>
</main>
